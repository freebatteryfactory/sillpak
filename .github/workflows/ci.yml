name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI never launches the Electron shell; typecheck only needs the electron
  # package's type surface, so skip the ~100 MB binary download per OS.
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install exact dependency graph
        run: pnpm install --frozen-lockfile

      - name: Static and unit lane (architecture QA, handoff QA, laws, typecheck, Gauntlet, audit)
        run: pnpm run check

      - name: Build every workspace package
        run: pnpm run build

      - name: Regression lane (production security matrix, PTY environment stripping)
        run: pnpm run test:regression
