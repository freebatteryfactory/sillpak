appId: dev.freebatteryfactory.sillpak
productName: SillPak
# pnpm keeps electron inside apps/desktop, so the version is pinned here explicitly.
electronVersion: 42.6.0
directories:
  output: artifacts
# node-pty and @parcel/watcher ship N-API prebuilds; rebuilding would require a local C++ toolchain.
npmRebuild: false
files:
  - package.json
  - apps/desktop/dist/**
  - apps/desktop/package.json
  - apps/shell/dist/**
  - apps/shell/package.json
# node-pty and @parcel/watcher are the only external runtime modules; they are
# declared in the root package.json so electron-builder collects them and their
# platform-native optional dependencies from the pnpm store.
asar: true
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/@parcel/**'
  # The Astro server is loaded with a real ESM import(), which cannot resolve
  # reliably from inside the asar archive; keep the shell build as plain files.
  - 'apps/shell/dist/**'
mac:
  target: dmg
win:
  target: nsis
linux:
  target: AppImage
