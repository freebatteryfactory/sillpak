appId: dev.freebatteryfactory.sillpak
productName: SillPak
directories:
  output: artifacts
npmRebuild: true
files:
  - package.json
  - apps/desktop/dist/**
  - apps/desktop/package.json
  - apps/shell/dist/**
  - apps/shell/package.json
  - node_modules/**
asar: true
asarUnpack:
  - '**/node_modules/node-pty/**'
  - '**/node_modules/@parcel/watcher/**'
mac:
  target: dmg
win:
  target: nsis
linux:
  target: AppImage
